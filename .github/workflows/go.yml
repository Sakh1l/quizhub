name: Go
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v3
        with:
          go-version: '1.20'
      - name: Install dependencies
        run: go mod download
      - name: Run tests
        run: go test ./...
      - name: Lint & fmt placeholder
        run: echo "Add golangci-lint or go vet/fmt here later"