name: Go CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod   # reads version directly from go.mod — no drift
          cache: true               # caches module downloads between runs

      - name: Verify dependencies
        run: |
          go mod download
          go mod verify

      - name: Check go.sum is tidy
        run: |
          go mod tidy
          git diff --exit-code go.sum go.mod || \
            (echo "go.sum or go.mod is out of date — run 'go mod tidy' and commit the result" && exit 1)

      - name: Build
        run: go build -v ./...

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test -v -race -count=1 ./...

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi
