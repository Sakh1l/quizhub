<!DOCTYPE html>
<html>
<head>
<title>QuizHub</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial;
  text-align: center;
  margin-top: 50px;
}

button {
  padding: 10px 20px;
  font-size: 18px;
}

input {
  padding: 10px;
  font-size: 18px;
}
</style>
</head>

<body>

<h1>QuizHub</h1>

<div id="join">
<h2>Join the Quiz</h2>

<input id="nickname" placeholder="Enter your name">
<br><br>

<button onclick="joinQuiz()">Join</button>
</div>

<div id="joined" style="display:none">
<h2>Waiting for question...</h2>
</div>

<script>

let playerId = null

async function joinQuiz() {

  const nickname = document.getElementById("nickname").value

  const res = await fetch("/join", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      nickname: nickname
    })
  })

  const data = await res.json()

  playerId = data.player_id

  document.getElementById("join").style.display = "none"
  document.getElementById("joined").style.display = "block"

}

</script>

</body>
</html>
